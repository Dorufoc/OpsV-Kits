version: '3.8'
services:
  db:
    image: 'redis:alpine'
    container_name: panel-redis
    restart: unless-stopped
    labels:
      managed-by: "opsv-kits-store"
    command: redis-server --requirepass '${REDIS_PASSWORD}'
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - /www/server/apps/redis/data:/data
