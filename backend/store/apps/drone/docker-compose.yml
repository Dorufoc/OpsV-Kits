version: '3.8'
services:
  app:
    image: 'drone/drone:latest'
    container_name: panel-drone
    restart: unless-stopped
    labels:
      managed-by: "opsv-kits-store"
    ports:
      - '${DRONE_PORT}:80'
    volumes:
      - /www/server/apps/drone/data:/data
    environment:
      DRONE_GITEA_SERVER: '${DRONE_GITEA_SERVER}'
      DRONE_RPC_SECRET: '${DRONE_RPC_SECRET}'
