version: '3.8'
services:
  app:
    image: codercom/code-server:latest
    container_name: panel-vscode-server
    restart: unless-stopped
    labels:
      managed-by: "opsv-kits-store"
    ports:
      - '${VSCODE_PORT}:8080'
    volumes:
      - /www/server/apps/vscode-server/data:/home/coder/project
    environment:
      - PASSWORD=${VSCODE_PASSWORD}
