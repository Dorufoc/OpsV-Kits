version: '3.8'
services:
  app:
    image: 'ghcr.io/open-webui/open-webui:latest'
    container_name: panel-open-webui
    restart: unless-stopped
    labels:
      managed-by: "opsv-kits-store"
    ports:
      - '${WEBUI_PORT}:8080'
    volumes:
      - /www/server/apps/open-webui/data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
