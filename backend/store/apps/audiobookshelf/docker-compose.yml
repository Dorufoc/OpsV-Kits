version: '3.8'
services:
  app:
    image: 'ghcr.io/advplyr/audiobookshelf:latest'
    container_name: panel-audiobookshelf
    restart: unless-stopped
    labels:
      managed-by: "opsv-kits-store"
    ports:
      - '${AUDIOBOOKSHELF_PORT}:80'
    volumes:
      - /www/server/apps/audiobookshelf/data:/config
