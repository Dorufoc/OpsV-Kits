version: '3.8'
services:
  app:
    image: 'ghcr.io/dgtlmoon/changedetection.io:latest'
    container_name: panel-changedetection
    restart: unless-stopped
    labels:
      managed-by: "opsv-kits-store"
    ports:
      - '${CHANGEDETECTION_PORT}:5000'
    volumes:
      - /www/server/apps/changedetection/data:/datastore
