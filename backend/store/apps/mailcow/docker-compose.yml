version: '3.8'
services:
  app:
    image: 'mailcow/server:latest'
    container_name: panel-mailcow
    restart: unless-stopped
    labels:
      managed-by: "opsv-kits-store"
    ports:
      - '${MAILCOW_HTTP_PORT}:80'
      - '${MAILCOW_HTTPS_PORT}:443'
    volumes:
      - /www/server/apps/mailcow/data:/data
