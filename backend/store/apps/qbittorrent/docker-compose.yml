version: '3.8'
services:
  app:
    image: 'linuxserver/qbittorrent:latest'
    container_name: panel-qbittorrent
    restart: unless-stopped
    labels:
      managed-by: "opsv-kits-store"
    ports:
      - '${QBIT_PORT}:8080'
    volumes:
      - /www/server/apps/qbittorrent/data:/config
      - /www/server/apps/qbittorrent/downloads:/downloads
