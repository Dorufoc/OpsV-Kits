version: '3.8'
services:
  app:
    image: 'traefik:v3.1'
    container_name: panel-traefik
    restart: unless-stopped
    labels:
      managed-by: "opsv-kits-store"
    ports:
      - '${TRAEFIK_HTTP_PORT}:80'
      - '${TRAEFIK_HTTPS_PORT}:443'
      - '${TRAEFIK_DASHBOARD_PORT}:8080'
    volumes:
      - /www/server/apps/traefik/data:/etc/traefik
      - /var/run/docker.sock:/var/run/docker.sock:ro
