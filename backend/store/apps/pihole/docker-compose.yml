version: '3.8'

services:
  app:
    image: pihole/pihole:latest
    container_name: panel-pihole
    restart: unless-stopped
    ports:
      - "${PIHOLE_DNS_PORT}:53/udp"
      - "${PIHOLE_WEB_PORT}:80"
    volumes:
      - /www/server/apps/pihole/data:/etc/pihole
      - /www/server/apps/pihole/dnsmasq:/etc/dnsmasq.d
    environment:
      - ServerIP=${PIHOLE_SERVER_IP:-127.0.0.1}
      - WEBPASSWORD=${PIHOLE_WEB_PASSWORD:-admin}
    labels:
      managed-by: "opsv-kits-store"
