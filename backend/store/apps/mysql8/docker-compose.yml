version: '3.8'
services:
  db:
    image: 'mysql:lts'
    container_name: panel-mysql8
    restart: unless-stopped
    labels:
      managed-by: "opsv-kits-store"
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - '${MYSQL_PORT}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD}'
    volumes:
      - /www/server/apps/mysql8/data:/var/lib/mysql
