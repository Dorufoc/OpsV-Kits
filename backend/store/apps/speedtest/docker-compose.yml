version: '3.8'
services:
  app:
    image: 'ghcr.io/alexjustesen/speedtest-tracker:latest'
    container_name: panel-speedtest
    restart: unless-stopped
    labels:
      managed-by: "opsv-kits-store"
    ports:
      - '${SPEEDTEST_PORT}:80'
    volumes:
      - /www/server/apps/speedtest/data:/etc/peedtesttracker
